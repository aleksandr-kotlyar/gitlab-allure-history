include:
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/gitlab-allure-history@$CI_COMMIT_SHA
    inputs:
      pages-branch: allure-pages

variables:
  GIT_CLONE_PATH: "$CI_BUILDS_DIR/$CI_PROJECT_PATH_SLUG/$CI_CONCURRENT_PROJECT_ID"

consumer_contract:
  image: alpine:3.22
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - when: never
  script:
    - mkdir -p allure-results
    - |
      printf '%s\n' \
        '{"uuid":"consumer-custom-pages-branch","name":"consumer custom pages branch","status":"passed","stage":"finished"}' \
        > allure-results/result.json
    - printf '%s\n' "$CI_JOB_ID" > jobid
  artifacts:
    paths:
      - allure-results
      - jobid
  tags:
    - macos-local

publish-allure-history:
  rules:
    - when: never

verify_consumer_contract:
  image: alpine:3.22
  stage: report
  dependencies:
    - consumer_contract
  rules:
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - when: never
  script:
    - test "$ENV" = "dev"
    - test "$PAGES_BRANCH" = "allure-pages"
    - test -d allure-results
    - test -s jobid
  tags:
    - macos-local
