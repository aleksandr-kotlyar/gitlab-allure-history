variables:
  ENV: dev
  ALLURE_HISTORY_IMAGE: registry.gitlab.com/aleksandr-kotlyar/gitlab-allure-history:2026.2.1
  ALLURE_HISTORY_TOOLS_DIR: /opt/gitlab-allure-history
  PAGES_BRANCH: gl-pages
  REPORTS_TO_KEEP: "30"

stages:
  - build
  - test
  - report

build_python:
  image: docker:29.3.1
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      exists:
        - Dockerfile
      when: always
    - when: never
  services:
    - docker:29.3.1-dind
  variables:
    ALLURE_HISTORY_IMAGE: $CI_COMMIT_REF_SLUG
  script:
    - set -euo pipefail
    - printf '%s' "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE:$IMAGE_TAG" .
    - docker push "$CI_REGISTRY_IMAGE:$IMAGE_TAG"

allure:
  image: $ALLURE_HISTORY_IMAGE
  stage: report
  resource_group: pages-publish
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: never
    - if: $CI_PIPELINE_SOURCE != "web"
      when: always
  pages: true
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - public

  script:
    - set -euo pipefail

    - |
      if [ -z "${GIT_PUSH_TOKEN:-}" ]; then
        echo "GIT_PUSH_TOKEN is required to push Allure reports to ${PAGES_BRANCH}."
        exit 1
      fi

    - |
      if ! git clone --single-branch --branch "$PAGES_BRANCH" "$CI_REPOSITORY_URL" pages-worktree; then
        echo "Failed to clone '${PAGES_BRANCH}'. Create the branch before publishing reports."
        exit 1
      fi

    - |
      if [ -s jobid ]; then
        JOB_ID="$(cat jobid)"
      else
        JOB_ID="$CI_JOB_ID"
      fi

      REPORT_DIR="job_${JOB_ID}"
      REPORT_ENV="${ENV:-dev}"
      REPORT_BRANCH="${CI_COMMIT_REF_SLUG:-detached}"

      PAGES_PUBLIC_DIR="pages-worktree/public"
      ENV_PUBLIC_DIR="${PAGES_PUBLIC_DIR}/${REPORT_ENV}"
      BRANCH_PUBLIC_DIR="${ENV_PUBLIC_DIR}/${REPORT_BRANCH}"
      HISTORY_DIR="${BRANCH_PUBLIC_DIR}/history"

      export JOB_ID REPORT_DIR REPORT_ENV REPORT_BRANCH

      mkdir -p allure-results "$BRANCH_PUBLIC_DIR"

      if [ -d "$HISTORY_DIR" ]; then
        cp -r "$HISTORY_DIR" allure-results/history
        echo "Restored previous Allure history from ${HISTORY_DIR}."
      else
        echo "No previous Allure history for '${REPORT_ENV}/${REPORT_BRANCH}'."
      fi

    - |
      if [ -f "${ALLURE_HISTORY_TOOLS_DIR}/prune_reports.py" ]; then
        PRUNE_REPORTS_PY="${ALLURE_HISTORY_TOOLS_DIR}/prune_reports.py"
      elif [ -f prune_reports.py ]; then
        PRUNE_REPORTS_PY="prune_reports.py"
      else
        echo "Missing prune_reports.py. Provide it in ${ALLURE_HISTORY_TOOLS_DIR} through the CI image or keep it in the repository root."
        exit 1
      fi

      if [ -f "${ALLURE_HISTORY_TOOLS_DIR}/generate_index.py" ]; then
        GENERATE_INDEX_PY="${ALLURE_HISTORY_TOOLS_DIR}/generate_index.py"
      elif [ -f generate_index.py ]; then
        GENERATE_INDEX_PY="generate_index.py"
      else
        echo "Missing generate_index.py. Provide it in ${ALLURE_HISTORY_TOOLS_DIR} through the CI image or keep it in the repository root."
        exit 1
      fi

      export PRUNE_REPORTS_PY GENERATE_INDEX_PY

    - |
      python3 - <<'PY'
      import json
      import os

      report_url = "{}/{}/{}/".format(
          os.environ["CI_PAGES_URL"].rstrip("/"),
          os.environ["REPORT_ENV"],
          os.environ["REPORT_BRANCH"],
          os.environ["REPORT_DIR"],
      )

      executor = {
          "name": "GitLab CI",
          "type": "gitlab",
          "reportName": "Allure Report with history",
          "reportUrl": report_url,
          "buildUrl": os.environ["CI_PIPELINE_URL"],
          "buildName": "GitLab Job Run {}".format(os.environ["JOB_ID"]),
          "buildOrder": os.environ["JOB_ID"],
      }

      with open("allure-results/executor.json", "w", encoding="utf-8") as file:
          json.dump(executor, file, indent=2)
          file.write("\n")
      PY

    - allure generate allure-results -o "$REPORT_DIR" --clean

    - |
      MODIFIED_AT="${CI_PIPELINE_CREATED_AT:-${CI_JOB_STARTED_AT:-}}"

      if [ -z "$MODIFIED_AT" ]; then
        MODIFIED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      fi

      rm -rf "$BRANCH_PUBLIC_DIR/$REPORT_DIR"
      cp -r "$REPORT_DIR" "$BRANCH_PUBLIC_DIR/$REPORT_DIR"

      printf "%s\n" "$MODIFIED_AT" > "$BRANCH_PUBLIC_DIR/$REPORT_DIR/.modified_at"

      rm -rf "$HISTORY_DIR"
      if [ -d "$REPORT_DIR/history" ]; then
        cp -r "$REPORT_DIR/history" "$HISTORY_DIR"
      else
        mkdir -p "$HISTORY_DIR"
      fi

      META_DIR="$BRANCH_PUBLIC_DIR"

      while :; do
        META_FILE="$META_DIR/.modified_at"

        if [ ! -f "$META_FILE" ] || [ "$(cat "$META_FILE")" \< "$MODIFIED_AT" ]; then
          printf "%s\n" "$MODIFIED_AT" > "$META_FILE"
        fi

        [ "$META_DIR" = "$PAGES_PUBLIC_DIR" ] && break

        META_DIR="$(dirname "$META_DIR")"
      done

      python3 "$PRUNE_REPORTS_PY" "$BRANCH_PUBLIC_DIR" "$REPORTS_TO_KEEP"

      python3 "$GENERATE_INDEX_PY" --recursive "$PAGES_PUBLIC_DIR"

    - |
      git -C pages-worktree config user.name "GitLab Runner"
      git -C pages-worktree config user.email "${GITLAB_USER_EMAIL:-gitlab-ci@example.invalid}"
      git -C pages-worktree remote set-url origin "https://oauth2:${GIT_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"

      git -C pages-worktree add public

      if git -C pages-worktree diff --cached --quiet; then
        echo "No Pages changes to publish."
      else
        git -C pages-worktree commit -m "Publish Allure report for pipeline ${CI_PIPELINE_ID}"
        git -C pages-worktree pull --rebase origin "$PAGES_BRANCH"
        git -C pages-worktree push origin "HEAD:$PAGES_BRANCH"
      fi

      rm -rf public
      cp -r pages-worktree/public public
