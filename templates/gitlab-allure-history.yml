spec:
  component: [version, reference]
  inputs:
    environment:
      default: dev
      description: Report environment folder under public/.
    allure-history-image:
      default: registry.gitlab.com/aleksandr-kotlyar/gitlab-allure-history
      description: Runtime image repository.
    allure-history-image-tag:
      default: "$[[ component.version ]]"
      description: Runtime image tag. Defaults to the component version when using a tagged reference. Required when using a SHA or branch reference.
    allure-history-tools-dir:
      default: /opt/gitlab-allure-history
      description: Directory in the runtime image containing generate_index.py and prune_reports.py.
    pages-branch:
      default: gl-pages
      description: Branch used to store generated Pages content and Allure history.
    reports-to-keep:
      default: "30"
      description: Number of report snapshots kept per environment and branch.
    build-runtime-image:
      default: "false"
      options:
        - "true"
        - "false"
      description: Build and push this project's tagged runtime image before tests in tag pipelines.
    comment-mr:
      default: "false"
      options:
        - "true"
        - "false"
      description: Post or update a merge request comment with the latest report URL.
---

variables:
  ENV: $[[ inputs.environment ]]
  ALLURE_HISTORY_IMAGE: $[[ inputs.allure-history-image ]]:$[[ inputs.allure-history-image-tag ]]
  ALLURE_HISTORY_TOOLS_DIR: $[[ inputs.allure-history-tools-dir ]]
  PAGES_BRANCH: $[[ inputs.pages-branch ]]
  REPORTS_TO_KEEP: $[[ inputs.reports-to-keep ]]
  ALLURE_HISTORY_COMMENT_MR: $[[ inputs.comment-mr ]]
  ALLURE_HISTORY_GENERATOR_VERSION: $[[ inputs.allure-history-image-tag ]]
  ALLURE_HISTORY_IMAGE_TAG: $[[ inputs.allure-history-image-tag ]]
  COMPONENT_VERSION: $[[ component.version ]]
  COMPONENT_REFERENCE: $[[ component.reference ]]

stages:
  - build
  - test
  - report
  - release

build_python:
  image: docker:29.3.1
  stage: build
  rules:
    - if: '"$[[ inputs.build-runtime-image ]]" == "true" && $CI_COMMIT_TAG'
      exists:
        - Dockerfile
      when: always
    - when: never
  services:
    - docker:29.3.1-dind
  variables:
    IMAGE_TAG: $CI_COMMIT_TAG
  script:
    - set -euo pipefail
    - printf '%s' "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE:$IMAGE_TAG" .
    - docker push "$CI_REGISTRY_IMAGE:$IMAGE_TAG"

allure:
  image: $ALLURE_HISTORY_IMAGE
  stage: report
  resource_group: pages-publish
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: never
    - if: $CI_PIPELINE_SOURCE != "web"
      when: always
  pages: true
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - public

  script:
    - set -euo pipefail

    - |
      if [ -z "${GIT_PUSH_TOKEN:-}" ]; then
        echo "GIT_PUSH_TOKEN is required to push Allure reports to ${PAGES_BRANCH}."
        exit 1
      fi

      if ! command -v git >/dev/null 2>&1; then
        echo "Missing git in ALLURE_HISTORY_IMAGE (${ALLURE_HISTORY_IMAGE}). Use the default image or provide git in your custom image."
        exit 1
      fi

      if ! command -v python3 >/dev/null 2>&1; then
        echo "Missing python3 in ALLURE_HISTORY_IMAGE (${ALLURE_HISTORY_IMAGE}). Use the default image or provide python3 in your custom image."
        exit 1
      fi

      if ! command -v allure >/dev/null 2>&1; then
        echo "Missing allure command in ALLURE_HISTORY_IMAGE (${ALLURE_HISTORY_IMAGE}). Use the default image or provide Allure commandline in your custom image."
        exit 1
      fi

      if [ -z "${ALLURE_HISTORY_IMAGE_TAG:-}" ]; then
        echo "ALLURE_HISTORY_IMAGE_TAG is empty. Provide a tagged component reference (e.g. @2026.x.y), or set the allure-history-image-tag input explicitly."
        echo "Component version: '${COMPONENT_VERSION:-unset}', reference: '${COMPONENT_REFERENCE:-unset}'"
        exit 1
      fi

    - |
      PAGES_BRANCH_STATUS=0
      git ls-remote --exit-code --heads "$CI_REPOSITORY_URL" "refs/heads/$PAGES_BRANCH" >/dev/null 2>&1 || PAGES_BRANCH_STATUS=$?

      if [ "$PAGES_BRANCH_STATUS" -eq 0 ]; then
        git clone --single-branch --branch "$PAGES_BRANCH" "$CI_REPOSITORY_URL" pages-worktree
      elif [ "$PAGES_BRANCH_STATUS" -eq 2 ]; then
        echo "Storage branch '${PAGES_BRANCH}' does not exist; creating it."
        git init pages-worktree
        git -C pages-worktree remote add origin "$CI_REPOSITORY_URL"
        git -C pages-worktree checkout --orphan "$PAGES_BRANCH"
      else
        echo "Failed to check storage branch '${PAGES_BRANCH}'. Verify repository access and CI network settings."
        exit 1
      fi

    - |
      if [ -s jobid ]; then
        JOB_ID="$(cat jobid)"
      else
        JOB_ID="$CI_JOB_ID"
      fi

      REPORT_DIR="job_${JOB_ID}"
      REPORT_ENV="${ENV:-dev}"
      REPORT_BRANCH="${CI_COMMIT_REF_SLUG:-detached}"

      PAGES_PUBLIC_DIR="pages-worktree/public"
      ENV_PUBLIC_DIR="${PAGES_PUBLIC_DIR}/${REPORT_ENV}"
      BRANCH_PUBLIC_DIR="${ENV_PUBLIC_DIR}/${REPORT_BRANCH}"
      HISTORY_DIR="${BRANCH_PUBLIC_DIR}/history"

      export JOB_ID REPORT_DIR REPORT_ENV REPORT_BRANCH

      mkdir -p allure-results "$BRANCH_PUBLIC_DIR"

      if [ -z "$(find allure-results -mindepth 1 -print -quit)" ]; then
        echo "Missing Allure results. At least one earlier job must upload allure-results/ as an artifact."
        exit 1
      fi

      if [ -d "$HISTORY_DIR" ]; then
        cp -r "$HISTORY_DIR" allure-results/history
        echo "Restored previous Allure history from ${HISTORY_DIR}."
      else
        echo "No previous Allure history for '${REPORT_ENV}/${REPORT_BRANCH}'."
      fi

    - |
      if [ -f prune_reports.py ]; then
        PRUNE_REPORTS_PY="prune_reports.py"
      elif [ -f "${ALLURE_HISTORY_TOOLS_DIR}/prune_reports.py" ]; then
        PRUNE_REPORTS_PY="${ALLURE_HISTORY_TOOLS_DIR}/prune_reports.py"
      else
        echo "Missing prune_reports.py. Provide it in ALLURE_HISTORY_TOOLS_DIR (${ALLURE_HISTORY_TOOLS_DIR}) through the CI image or keep it in the repository root."
        exit 1
      fi

      if [ -f generate_index.py ]; then
        GENERATE_INDEX_PY="generate_index.py"
      elif [ -f "${ALLURE_HISTORY_TOOLS_DIR}/generate_index.py" ]; then
        GENERATE_INDEX_PY="${ALLURE_HISTORY_TOOLS_DIR}/generate_index.py"
      else
        echo "Missing generate_index.py. Provide it in ALLURE_HISTORY_TOOLS_DIR (${ALLURE_HISTORY_TOOLS_DIR}) through the CI image or keep it in the repository root."
        exit 1
      fi

      export PRUNE_REPORTS_PY GENERATE_INDEX_PY

    - |
      python3 - <<'PY'
      import json
      import os

      report_url = "{}/{}/{}/{}/".format(
          os.environ["CI_PAGES_URL"].rstrip("/"),
          os.environ["REPORT_ENV"],
          os.environ["REPORT_BRANCH"],
          os.environ["REPORT_DIR"],
      )

      executor = {
          "name": "GitLab CI",
          "type": "gitlab",
          "reportName": "Allure Report with history",
          "reportUrl": report_url,
          "buildUrl": os.environ["CI_PIPELINE_URL"],
          "buildName": "GitLab Job Run {}".format(os.environ["JOB_ID"]),
          "buildOrder": os.environ["JOB_ID"],
      }

      with open("allure-results/executor.json", "w", encoding="utf-8") as file:
          json.dump(executor, file, indent=2)
          file.write("\n")
      PY

    - allure generate allure-results -o "$REPORT_DIR" --clean

    - |
      MODIFIED_AT="${CI_PIPELINE_CREATED_AT:-${CI_JOB_STARTED_AT:-}}"

      if [ -z "$MODIFIED_AT" ]; then
        MODIFIED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      fi

      rm -rf "$BRANCH_PUBLIC_DIR/$REPORT_DIR"
      cp -r "$REPORT_DIR" "$BRANCH_PUBLIC_DIR/$REPORT_DIR"

      printf "%s\n" "$MODIFIED_AT" > "$BRANCH_PUBLIC_DIR/$REPORT_DIR/.modified_at"

      rm -rf "$HISTORY_DIR"
      if [ -d "$REPORT_DIR/history" ]; then
        cp -r "$REPORT_DIR/history" "$HISTORY_DIR"
      else
        mkdir -p "$HISTORY_DIR"
      fi

      META_DIR="$BRANCH_PUBLIC_DIR"

      while :; do
        META_FILE="$META_DIR/.modified_at"

        if [ ! -f "$META_FILE" ] || [ "$(cat "$META_FILE")" \< "$MODIFIED_AT" ]; then
          printf "%s\n" "$MODIFIED_AT" > "$META_FILE"
        fi

        [ "$META_DIR" = "$PAGES_PUBLIC_DIR" ] && break

        META_DIR="$(dirname "$META_DIR")"
      done

      export GITLAB_ALLURE_HISTORY_VERSION="${GITLAB_ALLURE_HISTORY_VERSION:-${ALLURE_HISTORY_GENERATOR_VERSION:-${COMPONENT_VERSION:-unknown}}}"

      python3 "$PRUNE_REPORTS_PY" "$BRANCH_PUBLIC_DIR" "$REPORTS_TO_KEEP"

      python3 "$GENERATE_INDEX_PY" --recursive "$PAGES_PUBLIC_DIR"

    - |
      git -C pages-worktree config user.name "GitLab Runner"
      git -C pages-worktree config user.email "${GITLAB_USER_EMAIL:-gitlab-ci@example.invalid}"
      git -C pages-worktree remote set-url origin "https://oauth2:${GIT_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"

      rm -f pages-worktree/.gitlab-ci.yml
      git -C pages-worktree add public
      git -C pages-worktree rm -f --ignore-unmatch .gitlab-ci.yml

      if git -C pages-worktree diff --cached --quiet; then
        echo "No Pages changes to publish."
      else
        git -C pages-worktree commit -m "Publish Allure report for pipeline ${CI_PIPELINE_ID} [skip ci]"

        PAGES_PUSH_ATTEMPT=1
        PAGES_PUSH_MAX_ATTEMPTS=3

        while [ "$PAGES_PUSH_ATTEMPT" -le "$PAGES_PUSH_MAX_ATTEMPTS" ]; do
          REMOTE_BRANCH_STATUS=0
          git -C pages-worktree ls-remote --exit-code --heads origin "refs/heads/$PAGES_BRANCH" >/dev/null 2>&1 || REMOTE_BRANCH_STATUS=$?

          if [ "$REMOTE_BRANCH_STATUS" -eq 0 ]; then
            git -C pages-worktree pull --rebase origin "$PAGES_BRANCH"
          elif [ "$REMOTE_BRANCH_STATUS" -ne 2 ]; then
            echo "Failed to check remote storage branch '${PAGES_BRANCH}'."
            exit 1
          fi

          if git -C pages-worktree push -o ci.skip origin "HEAD:$PAGES_BRANCH"; then
            break
          fi

          if [ "$PAGES_PUSH_ATTEMPT" -eq "$PAGES_PUSH_MAX_ATTEMPTS" ]; then
            echo "Failed to push Pages content after ${PAGES_PUSH_MAX_ATTEMPTS} attempts."
            exit 1
          fi

          echo "Pages push attempt ${PAGES_PUSH_ATTEMPT}/${PAGES_PUSH_MAX_ATTEMPTS} failed; retrying after rebase."
          PAGES_PUSH_ATTEMPT=$((PAGES_PUSH_ATTEMPT + 1))
          sleep 2
        done
      fi

      rm -rf public
      cp -r pages-worktree/public public

    - |
      echo "MR comment: ALLURE_HISTORY_COMMENT_MR=${ALLURE_HISTORY_COMMENT_MR:-unset}, CI_MERGE_REQUEST_IID=${CI_MERGE_REQUEST_IID:-unset}"

      if [ "${ALLURE_HISTORY_COMMENT_MR}" != "true" ]; then
        echo "MR comment: skipping — ALLURE_HISTORY_COMMENT_MR is not 'true'."
        exit 0
      fi

      if [ -z "${CI_MERGE_REQUEST_IID:-}" ]; then
        echo "MR comment: skipping — not in a merge request pipeline."
        exit 0
      fi

      if [ -z "${ALLURE_HISTORY_TOKEN:-}" ]; then
        echo "MR comment: skipping — ALLURE_HISTORY_TOKEN with \"developer\" role and \"api\" scope is not set."
        exit 0
      fi

      TOKEN="${ALLURE_HISTORY_TOKEN}"
      REPORT_URL="${CI_PAGES_URL}/${REPORT_ENV}/${REPORT_BRANCH}/${REPORT_DIR}/"
      export REPORT_URL

      COMMENT_BODY=$(python3 <<'PY'
      import json
      import os

      report_url = os.environ["REPORT_URL"]

      summary_path = os.path.join(os.environ["REPORT_DIR"], "widgets", "summary.json")

      try:
          with open(summary_path) as f:
              data = json.load(f)
          stat = data.get("statistic", {})
          passed = int(stat.get("passed", 0))
          failed = int(stat.get("failed", 0))
          broken = int(stat.get("broken", 0))
          skipped = int(stat.get("skipped", 0))
          unknown = int(stat.get("unknown", 0))
          total = int(stat.get("total", 0))
          if total == 0:
              total = passed + failed + broken + skipped + unknown
      except (OSError, ValueError, KeyError, TypeError):
          passed = failed = broken = skipped = unknown = total = 0

      total_issues = failed + broken
      categories_url = f"{report_url}#categories"

      if total_issues > 0:
          body = (
              f"> [!caution]\n"
              f"> \U0001f534 **FAILED** \u00b7 "
              f"[Allure report {total_issues} issues]({categories_url}) "
              f"(failed {failed}, broken {broken}) \u00b7 {total} total"
          )
      else:
          body = (
              f"> [!tip]\n"
              f"> \U0001f7e2 **PASSED** \u00b7 "
              f"[Allure report]({categories_url}) \u00b7 {total} total"
          )

      print(body)
      PY
      )

      echo "MR comment: fetching current API user..."
      CURRENT_USER_ID=$(curl -s --header "PRIVATE-TOKEN: ${TOKEN}" \
        "${CI_API_V4_URL}/user" \
        | python3 -c 'import json,sys;print(json.load(sys.stdin).get("id",""))' \
        2>/dev/null || true)

      if [ -z "${CURRENT_USER_ID}" ]; then
        echo "MR comment: failed to authenticate with ALLURE_HISTORY_TOKEN. Skipping MR comment."
        exit 0
      fi
      echo "MR comment: authenticated as user id ${CURRENT_USER_ID}"

      echo "MR comment: looking for existing comment with marker by current user..."
      NOTE_ACTION="create"
      EXISTING_NOTE_ID=""

      NOTES_JSON=$(curl -s --header "PRIVATE-TOKEN: ${TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes?sort=desc&per_page=100" \
        2>/dev/null || true)

      MATCH_INFO=$(printf '%s' "${NOTES_JSON}" | python3 -c '
      import json, sys
      try:
          notes = json.load(sys.stdin)
      except (json.JSONDecodeError, TypeError):
          print("NONE")
          sys.exit(0)
      uid = sys.argv[1]
      total = len(notes)
      report_notes = [
          n for n in notes
          if (
              "[Allure report" in n.get("body", "")
              or "allure-history-report" in n.get("body", "")
          )
          and not n.get("system", False)
      ]
      own = [n for n in report_notes if str(n.get("author", {}).get("id", "")) == uid]
      foreign = [n for n in report_notes if str(n.get("author", {}).get("id", "")) != uid]
      if own:
          print("OWN:" + str(own[0]["id"]))
      elif foreign:
          print("FOREIGN:" + str(len(foreign)))
      else:
          print("NONE:" + str(len(report_notes)) + "/" + str(total))
      ' "${CURRENT_USER_ID}" 2>/dev/null || true)

      case "${MATCH_INFO}" in
        OWN:*)
          EXISTING_NOTE_ID="${MATCH_INFO#OWN:}"
          NOTE_ACTION="update"
          ;;
        FOREIGN:*)
          echo "MR comment: found ${MATCH_INFO#FOREIGN:} marker note(s) from other user(s); creating a new note for current token user."
          ;;
        NONE:*)
          COUNT_INFO="${MATCH_INFO#NONE:}"
          MARKER_COUNT="${COUNT_INFO%/*}"
          TOTAL_COUNT="${COUNT_INFO#*/}"
          echo "MR comment: no matching notes (${MARKER_COUNT} marker, ${TOTAL_COUNT} total notes on MR)."
          ;;
        "")
          echo "MR comment: no notes response from API."
          ;;
      esac

      if [ "${NOTE_ACTION}" = "update" ] && [ -n "${EXISTING_NOTE_ID}" ]; then
        echo "MR comment: updating note ${EXISTING_NOTE_ID}..."
        HTTP_CODE=$(curl -s --request PUT \
          --header "PRIVATE-TOKEN: ${TOKEN}" \
          --data-urlencode "body=${COMMENT_BODY}" \
          -w '%{http_code}' \
          -o /dev/null \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes/${EXISTING_NOTE_ID}" \
          || true)
        echo "MR comment: HTTP ${HTTP_CODE}"
        if [ "${HTTP_CODE}" = "403" ]; then
          echo "MR comment: note cannot be updated (HTTP 403). Falling back to creating a new note."
          NOTE_ACTION="create"
        elif [ "${HTTP_CODE}" = "404" ]; then
          echo "MR comment: note no longer exists (HTTP 404). Falling back to creating a new note."
          NOTE_ACTION="create"
        elif [ "${HTTP_CODE}" != "200" ]; then
          echo "MR comment: update failed (HTTP ${HTTP_CODE}), falling back to creating a new note."
          NOTE_ACTION="create"
        fi
      fi

      if [ "${NOTE_ACTION}" = "create" ]; then
        echo "MR comment: creating new note..."
        HTTP_CODE=$(curl -s --request POST \
          --header "PRIVATE-TOKEN: ${TOKEN}" \
          --data-urlencode "body=${COMMENT_BODY}" \
          -w '%{http_code}' \
          -o /dev/null \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes" \
          || true)
        echo "MR comment: HTTP ${HTTP_CODE}"
        if [ "${HTTP_CODE}" = "403" ]; then
          echo "MR comment: HTTP 403. ALLURE_HISTORY_TOKEN is authenticated but not allowed to create MR notes. Check api scope, project role, protected variables, and project access."
        elif [ "${HTTP_CODE}" = "401" ]; then
          echo "MR comment: HTTP 401. ALLURE_HISTORY_TOKEN is not valid. Check the token value and its api scope."
        elif [ "${HTTP_CODE}" = "000" ]; then
          echo "MR comment: HTTP 000. Network error reaching GitLab API. Check CI/CD network settings."
        fi
      fi
