include:
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/gitlab-allure-history@$CI_COMMIT_TAG
    inputs:
      allure-history-image-tag: $CI_COMMIT_TAG
      build-runtime-image: "true"
      comment-mr: "false"
    rules:
      - if: $CI_COMMIT_TAG
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/gitlab-allure-history@$CI_COMMIT_SHA
    inputs:
      allure-history-image-tag: "2026.2.8"
      comment-mr: "true"
    rules:
      - if: $CI_COMMIT_TAG == null

default:
  image: $ALLURE_HISTORY_IMAGE

ci_lint:
  stage: test
  script:
    - set -euo pipefail
    - test -n "${ALLURE_HISTORY_TOKEN:-}"
    - python3 validate_gitlab_ci.py
        --api-url "$CI_API_V4_URL"
        --project-id "$CI_PROJECT_ID"
        --ref "$CI_COMMIT_SHA"
        --private-token "$ALLURE_HISTORY_TOKEN"
  tags:
    - macos-local

test_gate:
  stage: test
  rules:
    - if: $IMAGE_TAG
    - if: $CI_PIPELINE_SOURCE != "web"
      when: always
  script:
    - set -euo pipefail
    - echo "$CI_JOB_ID" > jobid
    - pytest -m "not demo" --env="$ENV" --junitxml=report-gate.xml
  artifacts:
    when: always
    expire_in: 2 hours
    paths:
      - allure-results
      - jobid
      - report-gate.xml
  tags:
    - macos-local

test_demo:
  stage: test
  allow_failure: true
  rules:
    - if: $IMAGE_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE != "web"
      when: always
  script:
    - set -euo pipefail
    - pytest -m "demo" --env="$ENV" --junitxml=report-demo.xml
  artifacts:
    when: always
    expire_in: 2 hours
    paths:
      - allure-results
      - report-demo.xml
  tags:
    - macos-local

consumer_contract:minimal:
  stage: test
  inherit:
    variables: false
  rules:
    - if: $CI_PIPELINE_SOURCE != "web"
      when: always
  trigger:
    include:
      - local: tests/fixtures/consumer-minimal/.gitlab-ci.yml
    strategy: mirror

consumer_contract:custom-env:
  stage: test
  inherit:
    variables: false
  rules:
    - if: $CI_PIPELINE_SOURCE != "web"
      when: always
  trigger:
    include:
      - local: tests/fixtures/consumer-custom-env/.gitlab-ci.yml
    strategy: mirror

consumer_contract:without-jobid:
  stage: test
  inherit:
    variables: false
  rules:
    - if: $CI_PIPELINE_SOURCE != "web"
      when: always
  trigger:
    include:
      - local: tests/fixtures/consumer-without-jobid/.gitlab-ci.yml
    strategy: mirror

consumer_contract:custom-pages-branch:
  stage: test
  inherit:
    variables: false
  rules:
    - if: $CI_PIPELINE_SOURCE != "web"
      when: always
  trigger:
    include:
      - local: tests/fixtures/consumer-custom-pages-branch/.gitlab-ci.yml
    strategy: mirror

publish-allure-history:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: never
    - if: $CI_COMMIT_TAG
      when: always
    - if: $CI_COMMIT_TAG == null
      when: always
  tags:
    - macos-local

pages_smoke:
  stage: release
  needs:
    - job: test_gate
      artifacts: true
    - job: publish-allure-history
      artifacts: false
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: never
    - when: always
  script:
    - set -euo pipefail
    - test -s jobid
    - python3 smoke_public_pages.py
        --base-url "$CI_PAGES_URL"
        --environment "$ENV"
        --branch "$CI_COMMIT_REF_SLUG"
        --report "job_$(cat jobid)"
  tags:
    - macos-local

create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: $CI_COMMIT_TAG
      when: always
    - when: never
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG of the gitlab-allure-history component."
  tags:
    - macos-local
