include:
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/gitlab-allure-history@$CI_COMMIT_SHA
    inputs:
      allure-history-image-tag: "2026.2.8"

consumer_contract:
  image: alpine:3.22
  stage: test
  script:
    - mkdir -p allure-results
    - |
      printf '%s\n' \
        '{"uuid":"consumer-minimal","name":"consumer minimal","status":"passed","stage":"finished"}' \
        > allure-results/result.json
    - printf '%s\n' "$CI_JOB_ID" > jobid
  artifacts:
    paths:
      - allure-results
      - jobid
  tags:
    - macos-local

allure:
  rules:
    - when: never

verify_consumer_contract:
  image: alpine:3.22
  stage: report
  script:
    - test "$ENV" = "dev"
    - test "$PAGES_BRANCH" = "gl-pages"
    - test -d allure-results
    - test -s jobid
  tags:
    - macos-local
